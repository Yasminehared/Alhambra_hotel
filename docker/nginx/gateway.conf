upstream alhambra_backend {
    server backend:8080;
    keepalive 16;
}

upstream alhambra_frontend {
    server frontend:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Laravel API + admin + public assets
    location ~ ^/(api|admin|css|js|storage|sanctum|up) {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://alhambra_backend;
    }

    # React SPA (production build — no webpack dev server)
    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_pass http://alhambra_frontend;
    }
}
