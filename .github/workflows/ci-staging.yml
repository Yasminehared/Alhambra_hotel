name: 🔵 Staging CI — Alhambra Hotel

on:
  push:
    branches: [ staging, develop, feature/** ]
  pull_request:
    branches: [ staging, main ]

concurrency:
  group: ci-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Laravel PHPUnit Test Suite
  # ─────────────────────────────────────────────
  laravel-tests:
    name: 🧪 PHPUnit — Laravel Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: alhambra_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, pdo_mysql, bcmath, soap, intl, gd, exif, iconv, redis
          coverage: xdebug
          tools: composer:v2

      - name: 📦 Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: Backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('Backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 📥 Install Backend Dependencies
        working-directory: Backend
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: ⚙️ Prepare Laravel Environment
        working-directory: Backend
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force

      - name: 🔍 Run Laravel Pint (Code Style)
        working-directory: Backend
        run: vendor/bin/pint --test || true

      - name: ✅ Run PHPUnit Test Suite
        working-directory: Backend
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          php artisan config:clear
          php artisan test --parallel --coverage-clover=coverage.xml

      - name: 📊 Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: Backend/coverage.xml
          flags: laravel
          name: alhambra-backend-coverage

  # ─────────────────────────────────────────────
  # Job 2: React Frontend Build & Test
  # ─────────────────────────────────────────────
  react-build:
    name: ⚛️ React — Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📥 Install Frontend Dependencies
        working-directory: Frontend
        run: npm ci

      - name: 🔍 Run ESLint
        working-directory: Frontend
        run: npx eslint src --ext .js,.jsx --max-warnings=0 || true

      - name: 🏗️ Verify React Production Build
        working-directory: Frontend
        env:
          NODE_ENV: production
          GENERATE_SOURCEMAP: false
          CI: false
        run: npm run build

      - name: 📊 Analyze Bundle Size
        working-directory: Frontend
        run: |
          echo "=== Production Bundle Size Analysis ==="
          du -sh build/static/js/*.js 2>/dev/null | sort -h || true
          du -sh build/static/css/*.css 2>/dev/null | sort -h || true
          echo "=== Total Build Size ==="
          du -sh build/ || true

      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-staging-build
          path: Frontend/build/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Security Audit
  # ─────────────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 NPM Audit (Frontend)
        working-directory: Frontend
        run: |
          npm audit --audit-level=high || true

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: 📦 Cache Composer
        uses: actions/cache@v4
        with:
          path: Backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('Backend/composer.lock') }}

      - name: 📥 Install Backend Dependencies
        working-directory: Backend
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 🔒 Composer Audit (Backend)
        working-directory: Backend
        run: composer audit || true

  # ─────────────────────────────────────────────
  # Job 4: CI Status Gate (required for PR merge)
  # ─────────────────────────────────────────────
  ci-gate:
    name: ✅ CI Gate — All Checks Passed
    runs-on: ubuntu-latest
    needs: [ laravel-tests, react-build, security-audit ]
    if: always()
    steps:
      - name: Evaluate Gate
        run: |
          if [[ "${{ needs.laravel-tests.result }}" != "success" ]]; then
            echo "❌ Laravel tests FAILED"
            exit 1
          fi
          if [[ "${{ needs.react-build.result }}" != "success" ]]; then
            echo "❌ React build FAILED"
            exit 1
          fi
          echo "✅ All CI checks passed — safe to merge"
