name: 🛡️ Security & Dependency Scan — Alhambra Hotel

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6:00 AM UTC
  push:
    branches: [ main, staging ]
  workflow_dispatch:

jobs:
  dependency-scan:
    name: 🔍 Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: 📥 Install Backend Dependencies
        working-directory: Backend
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 🔒 Composer Audit
        working-directory: Backend
        run: |
          echo "### 🛡️ Composer Security Audit" >> $GITHUB_STEP_SUMMARY
          composer audit --format=json | tee audit_result.json || true
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat audit_result.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: 📥 Install Frontend Dependencies
        working-directory: Frontend
        run: npm ci

      - name: 🔒 NPM Audit
        working-directory: Frontend
        run: |
          echo "### 🛡️ NPM Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --json | tee npm_audit.json || true
          npm audit --audit-level=critical

  code-quality:
    name: 🎨 Code Quality Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: 📥 Install Backend Dependencies
        working-directory: Backend
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 🎨 Laravel Pint Code Style Check
        working-directory: Backend
        run: |
          echo "### 🎨 Laravel Pint Analysis" >> $GITHUB_STEP_SUMMARY
          vendor/bin/pint --test 2>&1 | tee pint_report.txt || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat pint_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
