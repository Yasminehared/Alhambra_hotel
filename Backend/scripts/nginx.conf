# =============================================================================
# Alhambra Hotel — Nginx Production Configuration
# =============================================================================
# Place at: /etc/nginx/sites-available/alhambra
# Enable: ln -s /etc/nginx/sites-available/alhambra /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx
# =============================================================================

# ─── Redirect HTTP → HTTPS ───────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt ACME challenge (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Redirect WWW → Non-WWW (HTTPS) ─────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    return 301 https://yourdomain.com$request_uri;
}

# ─── Main HTTPS Server Block ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # ── SSL Certificates (Let's Encrypt / Certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # ── SSL Hardening ────────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── OCSP Stapling ────────────────────────────────────────────────────
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Logging ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/alhambra_access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/alhambra_error.log warn;

    # ── Global Settings ──────────────────────────────────────────────────
    charset utf-8;
    client_max_body_size 20M;   # Upload limit
    index index.php index.html;

    # ── Security Headers (backup — also set in Laravel middleware) ───────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # ── Hide Nginx version ───────────────────────────────────────────────
    server_tokens off;

    # =========================================================================
    # REACT FRONTEND — Static Files
    # Root: /var/www/alhambra/frontend  (React build output)
    # =========================================================================
    root /var/www/alhambra/frontend;

    # Serve React SPA — all non-API, non-file requests go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching (React hashed bundles) ───────────────────────
    location ~* ^/static/(js|css|media)/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        gzip_static on;
        access_log off;
    }

    # ── Image Caching ────────────────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
        access_log off;
    }

    # ── Favicon ──────────────────────────────────────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log off;
        expires 1y;
    }

    # ── Robots ───────────────────────────────────────────────────────────
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # =========================================================================
    # LARAVEL BACKEND — API Proxy
    # Routes /api/* and /filament/* to PHP-FPM
    # =========================================================================
    location ~ ^/(api|filament|sanctum|up)/ {
        root /var/www/alhambra/current/public;

        try_files $uri $uri/ /index.php?$query_string;

        # ── PHP-FPM ──────────────────────────────────────────────────────
        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;

            # ── FastCGI Timeouts ─────────────────────────────────────────
            fastcgi_connect_timeout 60;
            fastcgi_send_timeout    300;
            fastcgi_read_timeout    300;
            fastcgi_buffer_size     16k;
            fastcgi_buffers         4 16k;
        }
    }

    # ── Laravel Storage (public disk) ────────────────────────────────────
    location /storage/ {
        alias /var/www/alhambra/current/storage/app/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ─── Block Sensitive Files ────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ ^/(\.env|\.git|composer\.(json|lock)|package\.json) {
        deny all;
        return 404;
    }

    # ── Gzip Compression ─────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;
}
