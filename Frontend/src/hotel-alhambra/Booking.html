<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alhambra — Reservation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #faf7f2; min-height: 100vh; display: flex;
           align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #fff; max-width: 560px; width: 100%;
            box-shadow: 0 2px 40px rgba(59,46,30,.08); }
    .banner { background: #3b2e1e; padding: 36px 48px 28px; }
    .banner-eye { font-family: Jost,sans-serif; font-size: .65rem;
                  letter-spacing: .22em; text-transform: uppercase;
                  color: #b8975a; margin-bottom: 8px; }
    .banner-title { font-family: 'Cormorant Garamond',serif; font-weight: 300;
                    font-size: 2.2rem; color: #f5ede0; line-height: 1.15; }
    .body { padding: 40px 48px; }
    label { display: block; font-size: .65rem; letter-spacing: .12em;
            text-transform: uppercase; color: #8a7560; margin-bottom: 6px;
            font-family: Jost,sans-serif; }
    input, select, textarea {
      width: 100%; background: #faf7f2; border: .5px solid #d8cfc4;
      padding: 11px 14px; font-family: Jost,sans-serif; font-size: .82rem;
      color: #3b2e1e; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: #b8975a; background: #fff; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .field { margin-bottom: 20px; }
    .error { color: #c0392b; font-size: .7rem; margin-top: 4px; display: none; }
    button { width: 100%; background: #b8975a; color: #fff; border: none;
             padding: 16px; cursor: pointer; font-family: Jost,sans-serif;
             font-size: .75rem; letter-spacing: .16em; text-transform: uppercase;
             transition: background .2s; }
    button:hover { background: #9a7a42; }
    .note { margin-top: 1rem; font-size: .72rem; color: #aaa;
            text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
<div class="card">
  <div class="banner">
    <p class="banner-eye">Alhambra Hotel & Spa</p>
    <h1 class="banner-title">Your Reservation</h1>
  </div>
  <div class="body">
    <div class="grid2">
      <div><label>Check-in</label><input type="date" id="check_in"/></div>
      <div><label>Check-out</label><input type="date" id="check_out"/></div>
    </div>
    <div class="grid2">
      <div><label>Adults</label>
        <select id="adults"><option>1</option><option selected>2</option><option>3</option><option>4</option></select></div>
      <div><label>Children</label>
        <select id="children"><option selected>0</option><option>1</option><option>2</option><option>3</option></select></div>
    </div>
    <div class="field"><label>Full Name</label><input type="text" id="full_name" placeholder="Your full name"/></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="your@email.com"/></div>
    <div class="field"><label>Phone</label><input type="tel" id="phone" placeholder="+212 600 000 000"/></div>
    <div style="margin-bottom:32px"><label>Special Requests</label>
      <textarea id="special_requests" rows="3" placeholder="Any special requests or notes..." style="resize:none;line-height:1.6"></textarea>
    </div>
    <button onclick="submitForm()">Confirm Reservation</button>
    <p id="msg" class="note">Free cancellation up to 48 hours before arrival</p>
  </div>
</div>
<script>
async function submitForm() {
  const body = {
    check_in: document.getElementById('check_in').value,
    check_out: document.getElementById('check_out').value,
    adults: document.getElementById('adults').value,
    children: document.getElementById('children').value,
    full_name: document.getElementById('full_name').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    special_requests: document.getElementById('special_requests').value,
  };
  const msg = document.getElementById('msg');
  try {
    const res = await fetch('/api/reservations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      msg.style.color = '#5a8a5a';
      msg.textContent = '✓ Reservation confirmed! We will contact you shortly.';
    } else {
      const data = await res.json();
      msg.style.color = '#c0392b';
      msg.textContent = Object.values(data.errors || {}).flat().join(' — ');
    }
  } catch {
    msg.style.color = '#c0392b';
    msg.textContent = 'Network error. Please try again.';
  }
}
</script>
</body>
</html>
